<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-11">

      <!-- Header Card -->
      <div class="card shadow mb-4">
        <div class="card-body">
          <h1 class="text-center mb-2">{{username}}'s Shop</h1>
          <p class="text-center text-muted">Find items listed by {{username}}</p>
        </div>
      </div>

      <!-- User Listings Section -->
      <div class="card shadow mb-4">
        <div class="card-body">
          <app-user-listings [userId]="userId" [username]="username"></app-user-listings>
        </div>
      </div>

    </div>
  </div>
</div>
