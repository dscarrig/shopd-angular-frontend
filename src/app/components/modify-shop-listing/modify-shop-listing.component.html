<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">

      <!-- Header Card -->
      <div class="card shadow mb-4">
        <div class="card-body">
          <h1 class="text-center mb-2">Modify Listing</h1>
          <p class="text-center text-muted">Update your shop item details</p>
        </div>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="card shadow mb-4">
        <div class="card-body text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3">Loading item details...</p>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage && !isLoading" class="card shadow mb-4">
        <div class="card-body">
          <div class="alert alert-danger" role="alert">
            {{errorMessage}}
          </div>
          <button class="btn btn-secondary" (click)="onCancel()">
            Go Back
          </button>
        </div>
      </div>

      <!-- Form Card -->
      <div *ngIf="!isLoading && !errorMessage" class="card shadow mb-4">
        <div class="card-body">
          <app-shopd-listing-form [submitButtonText]="'Update Listing'" [cancelButtonText]="'Cancel'"
            [showCancelButton]="true" [initialItemName]="itemName" [initialPrice]="price"
            [initialDescription]="description" [initialCategory]="category" [initialAvailable]="available"
            [initialQuantity]="quantity" [initialImageUrl]="imageUrl" (formSubmit)="onUpdateListing($event)"
            (formCancel)="onCancel()">
          </app-shopd-listing-form>
        </div>
      </div>

      <!-- Submitting Overlay -->
      <div *ngIf="isSubmitting" class="card shadow mb-4">
        <div class="card-body text-center py-5">
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Updating...</span>
          </div>
          <p class="mt-3">Updating your listing...</p>
        </div>
      </div>

      <!-- Delete Listing Card -->
      <div *ngIf="!isLoading && !errorMessage && !isSubmitting" class="card shadow border-danger mb-4">
        <div class="card-body">
          <h5 class="card-title text-danger mb-3">
            <i class="bi bi-exclamation-triangle"></i> Danger Zone
          </h5>
          <p class="text-muted mb-3">
            Once you delete this listing, there is no going back. Please be certain.
          </p>
          <button class="btn btn-danger" (click)="onDeleteListing()" type="button">
            <i class="bi bi-trash"></i> Delete Listing
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
