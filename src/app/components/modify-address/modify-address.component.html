<div class="card shadow mb-4">
  <div class="card-body">
    <h1 class="mb-4">Modify Your Address</h1>
    <p class="mb-4">Update your shipping address below. Make sure to save your changes before leaving the page.</p>
  </div>
</div>

<div class="container">
  <app-address-form [initialData]="initialAddressData" submitButtonText="Save New Address" cancelButtonText="Cancel"
    (formSubmit)="onAddressSave($event)" (formCancel)="onCancel()">
  </app-address-form>
</div>
